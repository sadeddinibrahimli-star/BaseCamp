<!DOCTYPE html>
<html>
<head>
    <title>New Project</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="page-header">
        <h1>Make New Project</h1>
        <a href="/home" class="btn-close">X</a>
    </div>

    <form action="/project-new" method="POST">
        <div class="form-group">
            <label for="pname">Name of The Project</label>
            <input type="text" id="pname" name="name" required>
        </div>
        <div class="form-group">
            <label for="pdescription">Description</label>
            <input type="text" id="pdescription" name="description">
        </div>
        <button type="submit">Submit</button>
    </form>
</body>
</html>
